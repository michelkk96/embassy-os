name: Automated Tests

on:
  push:
    branches:
      - master
      - next/*
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - master
      - next/*
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODEJS_VERSION: '24.17.0'
  ENVIRONMENT: dev-unstable

jobs:
  test:
    name: Run Automated Tests
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          nodejs-version: ${{ env.NODEJS_VERSION }}
          free-space: 'false'
          setup-docker: 'false'
          setup-sccache: 'false'

      - name: Build And Run Tests
        run: make test

  format:
    name: Formatting & Lockfiles
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          nodejs-version: ${{ env.NODEJS_VERSION }}
          free-space: 'false'
          setup-docker: 'false'
          setup-sccache: 'false'
      # `npm ci` fails if a lockfile is out of sync with its package.json, unlike the
      # build's `npm i` which silently rewrites it. This is the lockfile-drift gate.
      # web and the SDK both resolve start-core via file:shared-libs/ts-modules/start-core/dist,
      # so it must exist before their npm ci.
      - name: Build start-core
        run: cd shared-libs/ts-modules/start-core && make dist
      - name: Validate SDK lockfiles
        run: |
          npm --prefix shared-libs/ts-modules/start-core ci
          npm --prefix projects/start-sdk ci
      - name: Validate web lockfile
        run: npm ci
      # rustfmt runs in start9/fmt-env (pinned nightly); prettier + taplo run
      # natively. Building the image here means run-fmt.sh reuses it.
      - name: Build rustfmt container
        run: docker build -t start9/fmt-env -f build/fmt/fmtenv.Dockerfile build/fmt
      - name: Check formatting
        run: make format-check
