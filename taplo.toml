# Excludes filter matches but don't prune taplo's walk — bare `taplo fmt` hangs
# on openwrt/'s symlink loops, so the npm scripts pass a `git ls-files` list.
exclude = [
  "**/node_modules/**",
  "**/target/**",
  "**/dist/**",
  "projects/start-wrt/openwrt/**",
]
include = ["**/*.toml"]

[formatting]
align_entries = false
allowed_blank_lines = 2
array_auto_collapse = true
array_auto_expand = true
array_trailing_comma = true
column_width = 80
compact_arrays = true
compact_inline_tables = false
crlf = false
indent_string = '  '
indent_tables = false
reorder_keys = true
trailing_newline = true
